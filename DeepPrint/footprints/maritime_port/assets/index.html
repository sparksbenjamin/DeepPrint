<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Blue Harbor Container Terminal</title>
  <style>
    body {
      background: #eef2f4;
      color: #1b2832;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 2rem;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #b9c5cc;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
      margin: 0 auto;
      max-width: 720px;
      padding: 1.5rem 2rem;
    }

    h1 {
      border-bottom: 2px solid #5c7687;
      font-size: 1.6rem;
      margin: 0 0 1rem;
      padding-bottom: 0.5rem;
    }

    table {
      border-collapse: collapse;
      margin-top: 1rem;
      width: 100%;
    }

    td {
      border: 1px solid #cfd8dd;
      padding: 0.55rem 0.75rem;
    }

    td:first-child {
      background: #f4f7f8;
      font-weight: bold;
      width: 36%;
    }

    .status-ok {
      color: #20613b;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Blue Harbor Container Terminal</h1>
    <p>Siemens Quay Crane PLC operational overview.</p>
    <table>
      <tr>
        <td>Facility</td>
        <td>Blue Harbor Container Terminal</td>
      </tr>
      <tr>
        <td>Controller</td>
        <td>Siemens Quay Crane PLC</td>
      </tr>
      <tr>
        <td>Process Area</td>
        <td>Berth 7 Crane Row</td>
      </tr>
      <tr>
        <td>Operations State</td>
        <td class="status-ok">Normal Service</td>
      </tr>
    </table>
  </div>
</body>
</html>
